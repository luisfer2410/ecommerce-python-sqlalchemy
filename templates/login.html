<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Rain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='catalogo.css') }}">
    <style>
        body { background-color: #0d1b2a; color: white; font-family: 'Segoe UI', sans-serif; }
        .form-container { max-width: 400px; margin: 100px auto; background: #1b263b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.6); }
        .btn-rain { background-color: #00b4d8; color: white; border: none; width: 100%; font-weight: bold; }
        .btn-rain:hover { background-color: #0077b6; }
        input { background: #415a77 !important; border: 1px solid #577590 !important; color: white !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Bienvenido a <strong>RAIN</strong></h2>

            {# --- MENSAJES DE ERROR --- #}
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger p-2 small text-center">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" 
                           placeholder="usuario@gmail.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" 
                           placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-rain py-2">Entrar</button>
            </form>
            <p class="text-center mt-4">
                <small>¿No tienes cuenta? <a href="/registro" class="text-info text-decoration-none"><strong>Regístrate</strong></a></small>
            </p>
        </div>
    </div>
</body>
</html>2
