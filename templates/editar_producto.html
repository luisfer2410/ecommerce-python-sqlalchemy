<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto | Rain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: white; padding-top: 50px; }
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffc107; /* Amarillo para diferenciar de 'Crear' */
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .form-control, .form-select { background-color: #1a1f26; border: 1px solid #333; color: white; }
        .form-control:focus { background-color: #1a1f26; color: white; border-color: #ffc107; box-shadow: 0 0 10px rgba(255, 193, 7, 0.3); }
        label { color: #ffc107; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 form-container shadow-lg">
                <h2 class="text-center mb-4">MODIFICAR PRODUCTO #{{ producto.id }} 🌧️</h2>
                
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Nombre del Producto</label>
                            <input type="text" name="name" class="form-control" value="{{ producto.name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Categoría</label>
                            <select name="category" class="form-select">
                                <option value="T-Shirt" {% if producto.category == 'T-Shirt' %}selected{% endif %}>T-Shirt</option>
                                <option value="Pants" {% if producto.category == 'Pants' %}selected{% endif %}>Pants</option>
                                <option value="Hoodie" {% if producto.category == 'Hoodie' %}selected{% endif %}>Hoodie</option>
                                <option value="Accessory" {% if producto.category == 'Accessory' %}selected{% endif %}>Accessory</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Talla</label>
                            <select name="size" class="form-select" required>
                                <option value="S" {% if producto.size == 'S' %}selected{% endif %}>S</option>
                                <option value="M" {% if producto.size == 'M' %}selected{% endif %}>M</option>
                                <option value="L" {% if producto.size == 'L' %}selected{% endif %}>L</option>
                                <option value="XL" {% if producto.size == 'XL' %}selected{% endif %}>XL</option>
                                <option value="Unique" {% if producto.size == 'Unique' %}selected{% endif %}>Única</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Estatus</label>
                            <select name="status" class="form-select">
                                <option value="Available" {% if producto.status == 'Available' %}selected{% endif %}>Available</option>
                                <option value="Oferta" {% if producto.status == 'Oferta' %}selected{% endif %}>Oferta</option>
                                <option value="Agotado" {% if producto.status == 'Agotado' %}selected{% endif %}>Agotado</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Descripción</label>
                        <textarea name="description" class="form-control" rows="2">{{ producto.description }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Precio (REF)</label>
                            <input type="number" name="price" step="0.01" class="form-control" value="{{ producto.price }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Stock</label>
                            <input type="number" name="stock" class="form-control" value="{{ producto.stock_quantity }}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label>URL de la Imagen</label>
                        <input type="text" name="image_url" class="form-control" value="{{ producto.image_url }}">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning fw-bold">GUARDAR CAMBIOS</button>
                        <a href="{{ url_for('admin_panel', tabla='products') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
