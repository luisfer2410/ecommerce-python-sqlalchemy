<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto | Rain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: white; padding-top: 50px; }
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00bcd4;
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .form-control, .form-select {
            background-color: #1a1f26;
            border: 1px solid #333;
            color: white;
        }
        .form-control:focus {
            background-color: #1a1f26;
            color: white;
            border-color: #00bcd4;
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.3);
        }
        label { color: #00bcd4; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 form-container shadow-lg">
                <h2 class="text-center mb-4">AÑADIR NUEVA PRENDA 🌧️</h2>
                
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Nombre del Producto</label>
                            <input type="text" name="name" class="form-control" placeholder="Ej: Hoodie Oversize Black" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Categoría</label>
                            <select name="category" class="form-select" required>
                                <option value="T-Shirt">T-Shirt</option>
                                <option value="Pants">Pants</option>
                                <option value="Hoodie">Hoodie</option>
                                <option value="Accessory">Accessory</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Descripción</label>
                        <textarea name="description" class="form-control" rows="2" placeholder="Detalles de la tela, corte..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Precio (REF)</label>
                            <input type="number" name="price" step="0.01" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Stock Inicial</label>
                            <input type="number" name="stock" class="form-control" placeholder="Cant." required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Talla</label>
                            <select name="size" class="form-select" required>
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L">L</option>
                                <option value="XL">XL</option>
                                <option value="Unique">Única</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label>URL de la Imagen</label>
                        <input type="url" name="image_url" class="form-control" placeholder="https://link-de-la-foto.jpg">
                        <small class="text-white-50">Puedes usar un link de Pinterest o Imbb.</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-info fw-bold">GUARDAR PRODUCTO</button>
                        <a href="{{ url_for('admin_panel', tabla='products') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
