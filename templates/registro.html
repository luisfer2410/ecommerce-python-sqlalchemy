<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Rain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='catalogo.css') }}">
    <style>
        body { background-color: #0d1b2a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 400px; margin: 80px auto; background: #1b263b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.6); }
        .btn-rain { background-color: #00b4d8; color: white; border: none; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn-rain:hover { background-color: #0077b6; transform: translateY(-2px); }
        input { background: #415a77 !important; border: 1px solid #577590 !important; color: white !important; }
        input::placeholder { color: #cbd5e0 !important; opacity: 0.7; }
        .alert { font-size: 0.9rem; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Únete a <strong>RAIN</strong></h2>

            {# --- SECCIÓN DE MENSAJES DE ERROR (FLASH) --- #}
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger mb-3">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/registro" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" name="full_name" class="form-control" 
                           placeholder="Ej: Luisfer..." 
                           pattern="^[A-Za-z\s]+$" 
                           title="El nombre solo puede contener letras y espacios" 
                           required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" 
                           placeholder="usuario@gmail.com" 
                           required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" 
                           placeholder="Mínimo 6 caracteres" 
                           minlength="6" 
                           required>
                </div>
                <button type="submit" class="btn btn-rain py-2">Crear Cuenta</button>
            </form>
            
            <p class="text-center mt-4">
                <small>¿Ya tienes cuenta? <a href="/login" class="text-info text-decoration-none"><strong>Inicia sesión</strong></a></small>
            </p>
        </div>
    </div>
</body>
</html>
